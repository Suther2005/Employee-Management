# ============================================================
# Smart Employee Management System — Application Configuration
# ============================================================

spring.application.name=Smart Employee Management System

# -----------------------------------------------
# Server Configuration
# -----------------------------------------------
server.port=8080
server.servlet.context-path=/

# -----------------------------------------------
# MySQL Database Configuration
# -----------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/employee_management_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=suther123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -----------------------------------------------
# JPA / Hibernate Configuration
# -----------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=false

# -----------------------------------------------
# Thymeleaf Configuration
# -----------------------------------------------
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# -----------------------------------------------
# File Upload Configuration
# -----------------------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Upload directory (relative to project root)
app.upload.dir=src/main/resources/static/uploads/

# -----------------------------------------------
# Spring Mail Configuration (Gmail SMTP)
# Replace with your credentials or set via environment variables
# -----------------------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# -----------------------------------------------
# Session Configuration
# -----------------------------------------------
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# -----------------------------------------------
# Actuator (Health & Info)
# -----------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# -----------------------------------------------
# Logging
# -----------------------------------------------
logging.level.com.ems=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n

# -----------------------------------------------
# Application Custom Properties
# -----------------------------------------------
app.name=Smart EMS
app.version=1.0.0
app.admin.default-password=Admin@123
