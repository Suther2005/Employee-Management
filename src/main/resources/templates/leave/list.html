<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">
<head><title>Leave Management — Smart EMS</title></head>
<body>
<main>
<!-- Reject Reason Modal -->
<div class="modal fade" id="rejectModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content" style="border-radius:14px;border:none">
      <div class="modal-header border-0">
        <h5 class="modal-title"><i class="fas fa-times-circle text-danger me-2"></i>Reject Leave</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="rejectForm" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Rejection Reason *</label>
            <textarea name="rejectionReason" class="form-control" rows="3" required placeholder="Please provide a reason for rejection..."></textarea>
          </div>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn-ems btn-outline-ems" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn-ems btn-danger-ems"><i class="fas fa-times me-1"></i> Reject Leave</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="ems-card">
  <div class="ems-card-header">
    <h5><i class="fas fa-calendar-check me-2 text-primary"></i>Leave Management
      <span th:if="${pendingCount > 0}" class="badge ms-2" style="background:rgba(239,68,68,0.15);color:#dc2626;font-size:0.8rem">
        <span th:text="${pendingCount}">0</span> Pending
      </span>
    </h5>
  </div>
  <div class="ems-card-body">
    <div class="table-responsive">
      <table class="ems-table">
        <thead><tr><th>#</th><th>Employee</th><th>Type</th><th>From</th><th>To</th><th>Status</th><th>Applied</th><th>Actions</th></tr></thead>
        <tbody>
          <tr th:if="${#lists.isEmpty(leaves)}">
            <td colspan="8" class="text-center py-4 text-muted">No leave requests found.</td>
          </tr>
          <tr th:each="leave, i : ${leaves}">
            <td th:text="${(currentPage * 15) + i.count}">1</td>
            <td>
              <a th:href="@{/leave/view/{id}(id=${leave.id})}" th:text="${leave.employee.fullName}" class="fw-600 text-decoration-none">John Doe</a>
              <div style="font-size:0.75rem;color:var(--text-muted)" th:text="${leave.employee.empId}">EMP001</div>
            </td>
            <td><span class="badge rounded-pill" style="background:rgba(79,142,247,0.12);color:#4f8ef7;font-size:0.75rem" th:text="${leave.leaveType.name()}">CASUAL</span></td>
            <td th:text="${#temporals.format(leave.startDate, 'dd MMM yyyy')}">01 Jul 2026</td>
            <td th:text="${#temporals.format(leave.endDate, 'dd MMM yyyy')}">03 Jul 2026</td>
            <td><span class="badge-status" th:classappend="'badge-' + ${#strings.toLowerCase(leave.status.name())}" th:text="${leave.status.name()}">PENDING</span></td>
            <td th:text="${#temporals.format(leave.appliedDate, 'dd MMM yyyy')}">01 Jul 2026</td>
            <td>
              <div class="action-btns" th:if="${leave.status.name() == 'PENDING'}">
                <form th:action="@{/leave/approve/{id}(id=${leave.id})}" method="post" style="display:inline">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="btn-ems btn-success-ems btn-sm-ems" style="padding:5px 12px"><i class="fas fa-check me-1"></i>Approve</button>
                </form>
                <button type="button" class="btn-ems btn-danger-ems btn-sm-ems" style="padding:5px 12px"
                        th:attr="data-id=${leave.id}"
                        onclick="document.getElementById('rejectForm').action='/leave/reject/' + this.dataset.id"
                        data-bs-toggle="modal" data-bs-target="#rejectModal">
                  <i class="fas fa-times me-1"></i>Reject
                </button>
              </div>
              <a th:if="${leave.status.name() != 'PENDING'}" th:href="@{/leave/view/{id}(id=${leave.id})}" class="btn-action view"><i class="fas fa-eye"></i></a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <!-- Pagination -->
    <div class="d-flex justify-content-between align-items-center mt-3">
      <small class="text-muted">Total: <b th:text="${totalItems}">0</b> requests</small>
      <div class="pagination-ems" th:if="${totalPages > 1}">
        <a th:href="@{/leave(page=${currentPage - 1})}" class="page-btn" th:classappend="${currentPage == 0} ? 'disabled'"><i class="fas fa-angle-left"></i></a>
        <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
          <a th:href="@{/leave(page=${i})}" class="page-btn" th:classappend="${i == currentPage} ? 'active'" th:text="${i + 1}">1</a>
        </th:block>
        <a th:href="@{/leave(page=${currentPage + 1})}" class="page-btn" th:classappend="${currentPage == totalPages - 1} ? 'disabled'"><i class="fas fa-angle-right"></i></a>
      </div>
    </div>
  </div>
</div>
</main>
</body>
</html>
