<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">
<head><title>Apply Leave — Smart EMS</title></head>
<body>
<main>
<div class="ems-card" style="max-width:680px;margin:0 auto">
  <div class="ems-card-header">
    <h5><i class="fas fa-paper-plane me-2 text-primary"></i>Apply for Leave</h5>
    <a th:href="@{/leave/my-leaves}" class="btn-ems btn-outline-ems btn-sm-ems"><i class="fas fa-list me-1"></i> My Leaves</a>
  </div>
  <div class="ems-card-body">
    <form th:action="@{/leave/apply}" method="post" th:object="${leaveRequestDTO}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="mb-3">
        <label class="form-label">Leave Type *</label>
        <select th:field="*{leaveType}" class="form-select" th:classappend="${#fields.hasErrors('leaveType')} ? 'is-invalid'">
          <option value="">Select leave type</option>
          <option th:each="type : ${leaveTypes}" th:value="${type}" th:text="${type.name()}">CASUAL</option>
        </select>
        <div class="invalid-feedback" th:errors="*{leaveType}"></div>
      </div>
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label">Start Date *</label>
          <input type="date" id="startDate" th:field="*{startDate}" class="form-control" th:classappend="${#fields.hasErrors('startDate')} ? 'is-invalid'"/>
          <div class="invalid-feedback" th:errors="*{startDate}"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label">End Date *</label>
          <input type="date" id="endDate" th:field="*{endDate}" class="form-control" th:classappend="${#fields.hasErrors('endDate')} ? 'is-invalid'"/>
          <div class="invalid-feedback" th:errors="*{endDate}"></div>
        </div>
      </div>

      <!-- Days display -->
      <div class="days-display d-none mb-3">
        <div style="background:rgba(79,142,247,0.08);border:1px solid rgba(79,142,247,0.2);border-radius:8px;padding:10px 16px;color:#4f8ef7;font-weight:600">
          <i class="fas fa-calendar-check me-2"></i>
          Duration: <span id="leaveDaysCount">—</span>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label">Reason *</label>
        <textarea th:field="*{reason}" class="form-control" rows="4" th:classappend="${#fields.hasErrors('reason')} ? 'is-invalid'"
                  placeholder="Please provide a reason for your leave request..."></textarea>
        <div class="invalid-feedback" th:errors="*{reason}"></div>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn-ems btn-primary-ems"><i class="fas fa-paper-plane me-1"></i> Submit Application</button>
        <a th:href="@{/leave/my-leaves}" class="btn-ems btn-outline-ems">Cancel</a>
      </div>
    </form>
  </div>
</div>
</main>
</body>
</html>
