<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">
<head><title>Change Password — Smart EMS</title></head>
<body>
<main>
<div class="ems-card" style="max-width:500px;margin:0 auto">
  <div class="ems-card-header">
    <h5><i class="fas fa-lock me-2 text-primary"></i>Change Password</h5>
    <a th:href="@{/profile}" class="btn-ems btn-outline-ems btn-sm-ems"><i class="fas fa-arrow-left"></i> Back</a>
  </div>
  <div class="ems-card-body">
    <form th:action="@{/profile/change-password}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="mb-3">
        <label class="form-label">Current Password *</label>
        <input type="password" name="currentPassword" class="form-control" required autocomplete="current-password" placeholder="Enter current password"/>
      </div>
      <div class="mb-3">
        <label class="form-label">New Password *</label>
        <input type="password" name="newPassword" id="newPassword" class="form-control" required autocomplete="new-password" placeholder="At least 8 characters"/>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <small class="text-muted" id="strengthText"></small>
      </div>
      <div class="mb-4">
        <label class="form-label">Confirm New Password *</label>
        <input type="password" name="confirmPassword" class="form-control" required autocomplete="new-password" placeholder="Repeat new password"/>
      </div>
      <div class="mb-3" style="background:rgba(79,142,247,0.07);border-radius:8px;padding:12px;font-size:0.82rem;color:var(--text-muted)">
        <i class="fas fa-info-circle me-2 text-primary"></i>
        Password must be at least 8 characters and contain uppercase letters, numbers, and special characters.
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn-ems btn-primary-ems"><i class="fas fa-key me-1"></i> Change Password</button>
        <a th:href="@{/profile}" class="btn-ems btn-outline-ems">Cancel</a>
      </div>
    </form>
  </div>
</div>
</main>
</body>
</html>
