<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">
<head><title th:text="${pageTitle} + ' — Smart EMS'">Department Form</title></head>
<body>
<main>
<div class="ems-card" style="max-width:680px;margin:0 auto">
  <div class="ems-card-header">
    <h5><i class="fas fa-sitemap me-2 text-primary"></i><span th:text="${pageTitle}">Department Form</span></h5>
    <a th:href="@{/departments}" class="btn-ems btn-outline-ems btn-sm-ems"><i class="fas fa-arrow-left"></i> Back</a>
  </div>
  <div class="ems-card-body">
    <form th:action="${departmentDTO.id != null ? '/departments/update/' + departmentDTO.id : '/departments/save'}"
          method="post" th:object="${departmentDTO}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="hidden" th:field="*{id}"/>
      <div class="mb-3">
        <label class="form-label">Department Name *</label>
        <input type="text" th:field="*{name}" class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" placeholder="e.g. Engineering"/>
        <div class="invalid-feedback" th:errors="*{name}"></div>
      </div>
      <div class="mb-3">
        <label class="form-label">Department Head</label>
        <input type="text" th:field="*{head}" class="form-control" placeholder="e.g. Rajesh Kumar"/>
      </div>
      <div class="mb-4">
        <label class="form-label">Description</label>
        <textarea th:field="*{description}" class="form-control" rows="3" placeholder="Brief description of the department's role"></textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn-ems btn-primary-ems"><i class="fas fa-save me-1"></i>
          <span th:text="${departmentDTO.id != null ? 'Update Department' : 'Save Department'}">Save</span>
        </button>
        <a th:href="@{/departments}" class="btn-ems btn-outline-ems">Cancel</a>
      </div>
    </form>
  </div>
</div>
</main>
</body>
</html>
