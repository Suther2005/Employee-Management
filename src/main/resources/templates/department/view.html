<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">
<head><title th:text="${department.name} + ' — Smart EMS'">Department</title></head>
<body>
<main>
<div class="row g-3">
  <div class="col-md-4">
    <div class="ems-card">
      <div class="ems-card-header"><h5><i class="fas fa-sitemap me-2 text-primary"></i>Department Info</h5></div>
      <div class="ems-card-body">
        <div class="profile-detail-row">
          <div class="profile-detail-icon"><i class="fas fa-building"></i></div>
          <div><div style="font-size:0.75rem;color:var(--text-muted)">Name</div><div class="fw-600" th:text="${department.name}">HR</div></div>
        </div>
        <div class="profile-detail-row">
          <div class="profile-detail-icon"><i class="fas fa-user-tie"></i></div>
          <div><div style="font-size:0.75rem;color:var(--text-muted)">Head</div><div th:text="${department.head ?: '—'}">—</div></div>
        </div>
        <div class="profile-detail-row">
          <div class="profile-detail-icon"><i class="fas fa-align-left"></i></div>
          <div><div style="font-size:0.75rem;color:var(--text-muted)">Description</div><div th:text="${department.description ?: '—'}">—</div></div>
        </div>
        <div class="mt-3 d-flex gap-2">
          <a th:href="@{/departments/edit/{id}(id=${department.id})}" class="btn-ems btn-primary-ems btn-sm-ems flex-fill">Edit</a>
          <a th:href="@{/departments}" class="btn-ems btn-outline-ems btn-sm-ems flex-fill">Back</a>
        </div>
      </div>
    </div>
  </div>
  <div class="col-md-8">
    <div class="ems-card">
      <div class="ems-card-header">
        <h5><i class="fas fa-users me-2 text-primary"></i>Employees in this Department</h5>
        <span class="badge bg-primary" th:text="${#lists.size(employees)} + ' employees'">0</span>
      </div>
      <div class="ems-card-body p-0">
        <div class="table-responsive">
          <table class="ems-table">
            <thead><tr><th>Emp ID</th><th>Name</th><th>Designation</th><th>Status</th></tr></thead>
            <tbody>
              <tr th:if="${#lists.isEmpty(employees)}"><td colspan="4" class="text-center py-4 text-muted">No employees in this department.</td></tr>
              <tr th:each="emp : ${employees}">
                <td th:text="${emp.empId}">EMP001</td>
                <td><a th:href="@{/employees/view/{id}(id=${emp.id})}" th:text="${emp.fullName}" class="fw-600 text-decoration-none">John Doe</a></td>
                <td th:text="${emp.designation}">Engineer</td>
                <td><span class="badge-status" th:classappend="'badge-' + ${#strings.toLowerCase(emp.status.name())}" th:text="${emp.status.name()}">ACTIVE</span></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
</main>
</body>
</html>
