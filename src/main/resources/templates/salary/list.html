<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">
<head><title>Salary Management — Smart EMS</title></head>
<body>
<main>
<div class="ems-card">
  <div class="ems-card-header">
    <h5><i class="fas fa-money-bill-wave me-2 text-primary"></i>Salary Management</h5>
    <a th:href="@{/salary/add}" class="btn-ems btn-primary-ems"><i class="fas fa-plus"></i> Add Salary</a>
  </div>
  <div class="ems-card-body">
    <form th:action="@{/salary}" method="get" class="mb-3">
      <div class="search-bar" style="max-width:320px">
        <i class="fas fa-search"></i>
        <input type="text" name="keyword" class="form-control" placeholder="Search employee..." th:value="${keyword}"/>
      </div>
    </form>
    <div class="table-responsive">
      <table class="ems-table">
        <thead><tr><th>#</th><th>Employee</th><th>Emp ID</th><th>Basic</th><th>Allowance</th><th>Bonus</th><th>Deductions</th><th>Net Salary</th><th>Actions</th></tr></thead>
        <tbody>
          <tr th:if="${#lists.isEmpty(salaries)}">
            <td colspan="9" class="text-center py-4 text-muted">No salary records found.</td>
          </tr>
          <tr th:each="sal, i : ${salaries}">
            <td th:text="${(currentPage * 10) + i.count}">1</td>
            <td class="fw-600" th:text="${sal.employee.fullName}">John Doe</td>
            <td><span class="badge bg-light text-dark fw-600" th:text="${sal.employee.empId}">EMP001</span></td>
            <td th:text="'₹ ' + ${#numbers.formatDecimal(sal.basicSalary, 0, 'COMMA', 2, 'POINT')}">₹ 0</td>
            <td th:text="'₹ ' + ${#numbers.formatDecimal(sal.allowance, 0, 'COMMA', 2, 'POINT')}">₹ 0</td>
            <td class="text-success" th:text="'₹ ' + ${#numbers.formatDecimal(sal.bonus, 0, 'COMMA', 2, 'POINT')}">₹ 0</td>
            <td class="text-danger" th:text="'₹ ' + ${#numbers.formatDecimal(sal.deductions, 0, 'COMMA', 2, 'POINT')}">₹ 0</td>
            <td class="fw-700" style="color:#4f8ef7" th:text="'₹ ' + ${#numbers.formatDecimal(sal.netSalary, 0, 'COMMA', 2, 'POINT')}">₹ 0</td>
            <td>
              <div class="action-btns">
                <a th:href="@{/salary/edit/{id}(id=${sal.id})}" class="btn-action edit" title="Edit"><i class="fas fa-pen"></i></a>
                <form th:action="@{/salary/delete/{id}(id=${sal.id})}" method="post" class="confirm-delete" style="display:inline">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="btn-action delete" title="Delete"><i class="fas fa-trash"></i></button>
                </form>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="d-flex justify-content-end mt-3">
      <div class="pagination-ems" th:if="${totalPages > 1}">
        <a th:href="@{/salary(page=${currentPage - 1})}" class="page-btn" th:classappend="${currentPage == 0} ? 'disabled'"><i class="fas fa-angle-left"></i></a>
        <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
          <a th:href="@{/salary(page=${i})}" class="page-btn" th:classappend="${i == currentPage} ? 'active'" th:text="${i + 1}">1</a>
        </th:block>
        <a th:href="@{/salary(page=${currentPage + 1})}" class="page-btn" th:classappend="${currentPage == totalPages - 1} ? 'disabled'"><i class="fas fa-angle-right"></i></a>
      </div>
    </div>
  </div>
</div>
</main>
</body>
</html>
