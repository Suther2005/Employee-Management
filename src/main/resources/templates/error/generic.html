<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Error — Smart EMS</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link th:href="@{/css/main.css}" rel="stylesheet"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#f0f4ff; font-family:Inter,sans-serif; }
    .error-box { text-align:center; padding:48px; background:#fff; border-radius:20px; box-shadow:0 8px 40px rgba(0,0,0,0.1); max-width:480px; }
    .error-num { font-size:4rem; font-weight:800; color:#64748b; line-height:1; }
  </style>
</head>
<body>
<div class="error-box">
  <div class="error-num" th:text="${status ?: 'Error'}">Error</div>
  <h3 class="mt-3 mb-2" th:text="${error ?: 'An error occurred'}">An error occurred</h3>
  <p class="text-muted mb-4" th:text="${message ?: 'Something went wrong. Please try again.'}">Something went wrong.</p>
  <a th:href="@{/}" class="btn btn-primary px-4"><i class="fas fa-home me-2"></i>Go Home</a>
</div>
</body>
</html>
