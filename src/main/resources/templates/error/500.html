<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>500 Server Error — Smart EMS</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link th:href="@{/css/main.css}" rel="stylesheet"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#f0f4ff; font-family:Inter,sans-serif; }
    .error-box { text-align:center; padding:48px; background:#fff; border-radius:20px; box-shadow:0 8px 40px rgba(0,0,0,0.1); max-width:480px; }
    .error-num { font-size:6rem; font-weight:800; background:linear-gradient(135deg,#ef4444,#dc2626); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1; }
  </style>
</head>
<body>
<div class="error-box">
  <div class="error-num">500</div>
  <h3 class="mt-3 mb-2">Internal Server Error</h3>
  <p class="text-muted mb-4">Something went wrong on our end. Please try again later.</p>
  <a th:href="@{/dashboard}" class="btn btn-primary px-4">
    <i class="fas fa-home me-2"></i>Back to Dashboard
  </a>
</div>
</body>
</html>
